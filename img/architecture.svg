<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <title>postgres-Core architecture</title>
  <rect width="900" height="480" fill="#f4f6f8"/>
  <text x="450" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#1e293b">postgres-Core + mongodb-Core</text>
  <text x="450" y="54" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#64748b">Parallel DB Cores, isolated connections</text>

  <rect x="40" y="76" width="820" height="56" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="56" y="100" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#334155">L0 Runtime</text>
  <text x="56" y="118" font-family="Arial,sans-serif" font-size="12" fill="#64748b">Redis built-in only</text>

  <rect x="40" y="148" width="390" height="120" rx="10" fill="#ecfdf5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="56" y="172" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#14532d">mongodb-Core</text>
  <text x="56" y="192" font-family="Arial,sans-serif" font-size="11" fill="#64748b">registerCollection | flexible schema</text>
  <text x="56" y="248" font-family="Arial,sans-serif" font-size="11" fill="#64748b">profiles, logs, JSON docs</text>

  <rect x="470" y="148" width="390" height="120" rx="10" fill="#eff6ff" stroke="#336791" stroke-width="2"/>
  <text x="486" y="172" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#1e3a8a">postgres-Core</text>
  <text x="486" y="192" font-family="Arial,sans-serif" font-size="11" fill="#64748b">registerTable | SQL migrations | transactions</text>
  <rect x="486" y="204" width="100" height="28" rx="4" fill="#fff" stroke="#93c5fd"/>
  <text x="536" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#1d4ed8">Pool</text>
  <rect x="598" y="204" width="110" height="28" rx="4" fill="#fff" stroke="#93c5fd"/>
  <text x="653" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#1d4ed8">Repository</text>
  <rect x="720" y="204" width="120" height="28" rx="4" fill="#fff" stroke="#93c5fd"/>
  <text x="780" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#1d4ed8">Admin HTTP</text>

  <rect x="40" y="288" width="820" height="80" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="56" y="312" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#334155">L2 Business Core</text>
  <text x="56" y="334" font-family="Arial,sans-serif" font-size="12" fill="#64748b">Orders/ledger -&gt; postgres | Documents -&gt; mongo | Cache -&gt; Redis</text>

  <line x1="450" y1="268" x2="450" y2="288" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="450,288 446,280 454,280" fill="#64748b"/>
</svg>
